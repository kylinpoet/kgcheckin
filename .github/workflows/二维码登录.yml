name: 二维码登录
on:
  workflow_dispatch:
    inputs:
      number:
        description: "需要登录几个账号？"
        required: true
        default: "1"
      append_user:
        description: "是否追加新账号？（不删除已存在账号信息）"
        required: true
        type: choice
        default: "否"
        options:
          - 是
          - 否
      print_userinfo:
        description: "自动写入失败时是否在日志输出 USERINFO？（含登录token，默认否）"
        required: true
        type: choice
        default: "否"
        options:
          - 否
          - 是
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 创建 Node 环境
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ./api/package-lock.json

      - name: 检查 GitHub CLI
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh -y
          fi
          gh --version

      - name: 缓存依赖
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: ./api/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('./api/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 安装依赖
        run: npm run install
        if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}

      # ════════════════════════════════════════════
      #   步骤一：生成二维码 → PNG + Summary + HTML 登录页
      #   ✅ 完成后立即结束 step（process.exit(0) 保证干净退出）
      #   ════════════════════════════════════════════
      - name: 生成二维码图片与HTML登录页
        id: gen
        run: node qrcodeLogin.js gen
        env:
          NUMBER: ${{ github.event.inputs.number }}
          USERINFO: ${{ secrets.USERINFO }}
          APPEND_USER: ${{ github.event.inputs.append_user }}

      # ════════════════════════════════════════════
      #   步骤二：立即上传 HTML（gen 完成后立即可下载）
      #   ════════════════════════════════════════════
      - name: 上传二维码 HTML 页面（👈 下载这个！浏览器打开即可扫码）
        if: ${{ always() && steps.gen.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: 二维码HTML
          path: |
            qr/login.html
            qr/qr-*.html
          retention-days: 1
          if-no-files-found: warn

      # ═══ 备用：PNG 图片 ═══
      - name: 上传二维码 PNG 图片
        if: ${{ always() && steps.gen.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: 二维码PNG
          path: qr/*.png
          retention-days: 1
          if-no-files-found: warn

      # ═══ 错误处理 ═══
      - name: 二维码生成失败提示
        if: ${{ failure() }}
        run: |
          echo "::error::❌ 二维码生成失败"
          echo ""
          echo "排查方向："
          echo "  1️⃣ 运行器网络是否能访问酷狗接口（查看上方步骤日志）"
          echo "  2️⃣ npm 依赖安装是否成功"

      # ════════════════════════════════════════════
      #   步骤三：轮询等待用户扫码确认
      #   用 always() 确保无论前面怎样都会尝试执行（内部自行判断）
      #   ════════════════════════════════════════════
      - name: 等待扫码登录
        if: ${{ always() }}
        run: node qrcodeLogin.js wait
        env:
          USERINFO: ${{ secrets.USERINFO }}
          APPEND_USER: ${{ github.event.inputs.append_user }}
          ALLOW_PRINT_USERINFO: ${{ github.event.inputs.print_userinfo }}
          PAT: ${{ secrets.PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # ═══ 兜底 ═══
      - name: 上传全部文件（兜底）
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: 二维码全部文件_兜底
          path: qr/
          retention-days: 1
          if-no-files-found: ignore
